# Production stack: nginx (edge) -> backend (Gunicorn/Flask) -> PostgreSQL
# Calistirma: .env.docker dosyasini kopyalayip doldurun, sonra:
#   docker compose --env-file .env.docker up -d --build
#
# Mimari:
#   [Internet] -> :80 nginx -> proxy_pass -> backend:5000 (Gunicorn) -> db:5432 (PostgreSQL)

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-harcama}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set_POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-harcama_masraf}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"${POSTGRES_USER:-harcama}\" -d \"${POSTGRES_DB:-harcama_masraf}\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      FLASK_ENV: production
      DATABASE_URL: ${DATABASE_URL:?set_DATABASE_URL}
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:?set_FLASK_SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?set_JWT_SECRET_KEY}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_INITIAL_PASSWORD: ${ADMIN_INITIAL_PASSWORD:-}
      API_ORIGIN: ${API_ORIGIN:-http://localhost}
      API_PREFIX: ${API_PREFIX:-/api}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-4}
      GUNICORN_THREADS: ${GUNICORN_THREADS:-2}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-120}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "5000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
